<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #222;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        input,
        button {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        button {
            background: #00ffcc;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <script>
        function login() {
            fetch("https://elite-sports-complex.onrender.com/admin/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: document.getElementById("email").value,
                    password: document.getElementById("password").value
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        localStorage.setItem("adminEmail", data.email);
                        window.location.href = "admin-dashboard.html";
                    } else {
                        alert(data.message);
                    }
                });
        }
    </script>

</body>

</html>
