<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            background: #e6e6f3;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 {
            margin: 0;
        }

        .logout-btn {
            background: #dc3545;
            border: none;
            padding: 8px 12px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .card h3 {
            margin: 10px 0;
            color: #555;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
            color: #1a73e8;
        }

        table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: #1a73e8;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        input {
            padding: 6px;
            width: 80px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button.update-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 16px;
            border-radius: 6px;
            opacity: 0;
            transition: 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        .success {
            background: #28a745;
        }

        .error {
            background: #dc3545;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="top-bar">
            <h2>Admin Dashboard</h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- 🔥 Stats Section -->
        <div class="stats">
            <div class="card">
                <h3>Total Users</h3>
                <p id="totalUsers">0</p>
            </div>

            <div class="card">
                <h3>Total Bookings</h3>
                <p id="totalBookings">0</p>
            </div>

            <div class="card">
                <h3>Total Revenue</h3>
                <p id="revenue">₹0</p>
            </div>
        </div>

        <!-- Users Table -->
        <table id="usersTable">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Coins</th>
                <th>Action</th>
            </tr>
        </table>

    </div>

    <div id="toast" class="toast"></div>

    <script>
        const adminEmail = localStorage.getItem("adminEmail");

        if (!adminEmail) {
            window.location.href = "index.html";
        }

        // 🔥 Load Stats
        fetch("https://elite-sports-complex.onrender.com/admin/stats")
            .then(res => res.json())
            .then(data => {
                document.getElementById("totalUsers").innerText = data.totalUsers;
                document.getElementById("totalBookings").innerText = data.totalBookings;
                document.getElementById("revenue").innerText = "₹" + data.revenue;
            });

        // Load users
        fetch("https://elite-sports-complex.onrender.com/admin/users")
            .then(res => res.json())
            .then(data => {
                const table = document.getElementById("usersTable");

                data.users.forEach(user => {
                    const row = `
        <tr>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>
                <input type="number" id="coins-${user.email}" value="${user.coins}">
            </td>
            <td>
                <button class="update-btn" onclick="updateCoins('${user.email}')">Update</button>
            </td>
        </tr>`;
                    table.innerHTML += row;
                });
            });

        // Update coins
        function updateCoins(userEmail) {
            const coins = document.getElementById(`coins-${userEmail}`).value;

            fetch("https://elite-sports-complex.onrender.com/admin/update-coins", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: adminEmail,
                    targetEmail: userEmail,
                    coins: Number(coins),
                    action: "set"
                })
            })
                .then(res => res.json())
                .then(data => {
                    showToast(data.message, data.success ? "success" : "error");
                });
        }

        // Toast
        function showToast(message, type) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast show " + type;

            setTimeout(() => {
                toast.className = "toast";
            }, 3000);
        }

        // Logout
        function logout() {
            localStorage.removeItem("adminEmail");
            window.location.href = "index.html";
        }
    </script>

</body>

</html>
